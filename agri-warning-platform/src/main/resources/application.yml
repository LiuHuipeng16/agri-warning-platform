server:
  address: 0.0.0.0


spring:
  application:
    name: agri-warning-platform

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB


  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5s

  ai:
    # 文本大模型：DeepSeek
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

    # 阿里百炼：多模态 + 向量模型
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}

      # 多模态模型：用于图文识别
      chat:
        options:
          model: qwen3.6-flash
          multi-model: true
          temperature: 0.7

      # 向量模型：用于RAG知识库检索
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 2048


mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleteFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: info
    com.zhku.agri: debug
    com.baomidou.mybatisplus: info

project:
  upload:
    max-image-size: 5242880
    allowed-image-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp

app:
  jwt-ignore-urls:
    - /api/auth/login
    - /api/auth/register
    - /doc.html
    - /swagger-ui.html
    - /swagger-ui/**
    - /v3/api-docs/**
    - /webjars/**

jwt:
  secret: agriWarningPlatformSecretKey2026ChangeThisInProduction
  expiration: 86400000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true