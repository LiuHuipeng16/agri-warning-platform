server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: agri-warning-platform

  profiles:
    active: local

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null


  # ... existing code ...

  datasource:
    url: jdbc:mysql://localhost:3306/agri_pest_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ... existing code ...

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5s

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.zhku.agri.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleteFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: info
    com.zhku.agri: debug
    com.baomidou.mybatisplus: info

project:
  upload:
    max-image-size: 5242880
    allowed-image-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp

